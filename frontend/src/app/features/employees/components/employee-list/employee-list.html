@if (employeesService.employees.isLoading()) {
  <mat-spinner />
}

@if (employeesService.employees.error()) {
  <p>Error loading data.</p>
}

<table mat-table [dataSource]="employeesService.data()" class="mat-elevation-z8">
  <ng-container matColumnDef="firstName">
    <th mat-header-cell *matHeaderCellDef>First Name</th>
    <td mat-cell *matCellDef="let u">{{ u.firstName }}</td>
  </ng-container>

  <ng-container matColumnDef="lastName">
    <th mat-header-cell *matHeaderCellDef>Last Name</th>
    <td mat-cell *matCellDef="let u">{{ u.lastName }}</td>
  </ng-container>

  <ng-container matColumnDef="office">
    <th mat-header-cell *matHeaderCellDef>Office</th>
    <td mat-cell *matCellDef="let u">{{ u.office }}</td>
  </ng-container>

  <ng-container matColumnDef="dateOfBirth">
    <th mat-header-cell *matHeaderCellDef>Date Of Birth</th>
    <td mat-cell *matCellDef="let u">{{ u.dateOfBirth }}</td>
  </ng-container>

  <ng-container matColumnDef="phoneNumber">
    <th mat-header-cell *matHeaderCellDef>Phone Number</th>
    <td mat-cell *matCellDef="let u">{{ u.phoneNumber }}</td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

<mat-paginator
  [length]="employeesService.meta()?.total ?? 0"
  [pageIndex]="(employeesService.meta()?.page ?? 1) - 1"
  [pageSize]="employeesService.meta()?.limit ?? 5"
  [pageSizeOptions]="[5, 10, 20]"
  (page)="onPageChange($event)"
  showFirstLastButtons
>
</mat-paginator>
